name: Skol AI - Ročni Deploy

on:
  # 1. Tole ustvari gumb "Run workflow" za ročni zagon!
  workflow_dispatch:
  
  # 2. Avtomatski zagon ob vsakem shranjevanju na glavno vejo
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Prenos kode
        uses: actions/checkout@v4

      - name: ⚙️ Nastavitev GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Priprava datotek za objavo
        uses: actions/upload-pages-artifact@v3
        with:
          # Če imaš navaden HTML, pusti '.'
          # Če uporabljaš React/Vite in moraš stran "zgraditi", bo tu morda pisalo './dist'
          path: '.'

      - name: 🚀 Objava na spletni strani (Deploy)
        id: deployment
        uses: actions/deploy-pages@v4
