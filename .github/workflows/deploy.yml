name: Skol AI - Ročni Deploy (Vite)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Prenos kode
        uses: actions/checkout@v4

      - name: ⚙️ Nastavitev Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Namestitev paketov
        run: npm install

      - name: 🏗️ Gradnja projekta (Build)
        run: npm run build

      - name: ⚙️ Nastavitev GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Priprava datotek za objavo
        uses: actions/upload-pages-artifact@v3
        with:
          # TUKAJ JE BILA NAPAKA: Vite mora objaviti mapo 'dist'!
          path: './dist'

      - name: 🚀 Objava na spletni strani (Deploy)
        id: deployment
        uses: actions/deploy-pages@v4
